<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>NEON SNAKE</h1>
            <div class="score-board">
                <div class="score-item">SCORE: <span id="current-score">0</span></div>
                <div class="score-item">HIGH: <span id="high-score">0</span></div>
            </div>
        </header>

        <div id="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="overlay" class="overlay">
                <div id="start-screen">
                    <p>Press Start or Any Key</p>
                    <div class="setting-item">
                        <label class="switch">
                            <input type="checkbox" id="obstacle-mode">
                            <span class="slider"></span>
                        </label>
                        <span>Obstacle Mode</span>
                    </div>
                    <div class="setting-item speed-selector">
                        <span>Speed:</span>
                        <div class="speed-options">
                            <label><input type="radio" name="speed" value="200"> <span>Slow</span></label>
                            <label><input type="radio" name="speed" value="150" checked> <span>Mid</span></label>
                            <label><input type="radio" name="speed" value="80"> <span>Fast</span></label>
                        </div>
                    </div>
                    <button id="start-btn">START GAME</button>
                </div>
                <div id="game-over-screen" class="hidden">
                    <h2>GAME OVER</h2>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <button id="restart-btn">TRY AGAIN</button>
                </div>
            </div>
        </div>

        <div class="controls-hint">
            <p>Use Arrow Keys or WASD to move</p>
            <div class="customize-section">
                <label for="head-image-upload" class="upload-label">Customize Snake Head</label>
                <input type="file" id="head-image-upload" accept="image/*">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
